groups:
  - name: application_alerts
    interval: 30s
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: nestjs-backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          dashboard: "http://grafana:3000/d/app-metrics"

      # High latency alert
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          service: nestjs-backend
        annotations:
          summary: "High request latency detected"
          description: "P95 latency is {{ $value }}s (threshold: 1s)"

      # API authentication errors
      - alert: AuthenticationFailures
        expr: rate(http_requests_total{status="401"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: auth
        annotations:
          summary: "High authentication failure rate"
          description: "Rate: {{ $value | humanizePercentage }} in last 5m"

      # Service down
      - alert: BackendServiceDown
        expr: up{job="nestjs-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: nestjs-backend
        annotations:
          summary: "Backend service is down"
          description: "NestJS backend at {{ $labels.instance }} is down"

      # Memory pressure
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / (1024 * 1024 * 1024) > 1.0
        for: 5m
        labels:
          severity: warning
          service: nestjs-backend
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage: {{ $value }}GB (threshold: 1GB)"

      # Request queue depth (backlog)
      - alert: RequestQueueBacklog
        expr: histogram_sum(rate(http_requests_total[1m])) > 100
        for: 5m
        labels:
          severity: warning
          service: nestjs-backend
        annotations:
          summary: "Request queue backlog detected"
          description: "{{ $value }} requests/sec (normal < 100)"

      # Database connection pool exhaustion
      - alert: DBConnectionPoolExhausted
        expr: pg_stat_activity_count > 90
        for: 2m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "{{ $value }}/100 connections in use"

      # Sentry error spike
      - alert: SentryErrorSpike
        expr: rate(sentry_errors_total[5m]) > 1.0
        for: 5m
        labels:
          severity: critical
          service: sentry
        annotations:
          summary: "Error spike in Sentry"
          description: "{{ $value }} errors/sec (threshold: 1/sec)"
