apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 30s
      maxConsoleLines: 1000

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: Sentry Error ID
          matcherRegex: 'eventId:\s*(\w+)'
          url: 'https://sentry.io/organizations/your-org/issues/?query=${__value.raw}'
          datasourceUid: 'prometheus'

  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    isDefault: false
    editable: true
